<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Circular Equation Simulation</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent2: #4ecdc4;
      --accent3: #f7c948;
      --text: #e8e9f0;
      --muted: #6b6e87;
      --neg: #f06a6a;
      --pos: #4ecdc4;
      --font-mono: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
      --font-ui: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); margin: 0; }
    #jspsych-target { background: var(--bg) !important; }
    .jspsych-display-element { background: var(--bg) !important; }

    .trial-wrap {
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 16px; gap: 16px; max-width: 860px; margin: 0 auto;
    }
    .trial-num { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .trial-num span { color: var(--accent); font-weight: 700; }

    .stim-row {
      display: flex; gap: 18px; align-items: flex-start;
      justify-content: center; width: 100%; flex-wrap: wrap;
    }
    .stim-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .stim-col-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }

    .scen-video {
      width: 320px; height: 200px; border-radius: 10px;
      border: 2px solid var(--accent); background: #000; object-fit: cover; display: block;
    }
    .scen-val-badge {
      font-family: var(--font-mono); font-size: 13px; color: var(--accent);
      background: rgba(124,106,247,.12); padding: 2px 10px; border-radius: 6px;
    }
    .out-img {
      width: 140px; height: 140px; object-fit: cover;
      border-radius: 10px; border: 2px solid var(--accent2); display: block;
    }
    .out-val-badge {
      font-family: var(--font-mono); font-size: 13px; color: var(--accent2);
      background: rgba(78,205,196,.12); padding: 2px 10px; border-radius: 6px;
    }

    .resp-section { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .resp-section-label { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .resp-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .resp-card {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--panel); border: 2px solid var(--border);
      border-radius: 10px; padding: 8px;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .resp-card.active {
      border-color: var(--accent3); background: rgba(247,201,72,.12); transform: scale(1.05);
    }
    .resp-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 7px; display: block; }
    .resp-card-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
    .resp-key {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 6px;
      border: 2px solid var(--accent3); background: rgba(247,201,72,.10);
      font-family: var(--font-mono); font-size: 14px; font-weight: 700; color: var(--accent3);
    }

    .info-chip {
      background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
      padding: 5px 12px; font-family: var(--font-mono); font-size: 12px;
    }
    .info-chip .lbl { color: var(--muted); margin-right: 5px; }
    .info-chip .val { color: var(--accent3); font-weight: 700; }

    .prev-strip { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

    .eq-panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px; width: 100%; max-width: 560px;
    }
    .eq-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; font-family: var(--font-mono); font-size: 12px; }
    .eq-label { color: var(--muted); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; min-width: 58px; }
    .eq-expr { color: var(--text); }

    svg.dial text { font-family: var(--font-mono); }

    .results-wrap { padding: 28px 16px; max-width: 960px; margin: 0 auto; }
    .results-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .results-sub { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
    table.log { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
    table.log th {
      background: var(--panel); color: var(--muted); font-size: 10px;
      letter-spacing: .08em; text-transform: uppercase;
      padding: 8px 10px; text-align: right; border-bottom: 1px solid var(--border);
    }
    table.log th:first-child { text-align: center; }
    table.log td { padding: 7px 10px; text-align: right; border-bottom: 1px solid rgba(42,45,62,.6); }
    table.log td:first-child { text-align: center; color: var(--muted); }
    table.log tr:hover td { background: rgba(124,106,247,.05); }
    .pos-cell { color: var(--pos); }
    .neg-cell { color: var(--neg); }
    .zero-cell { color: var(--muted); }
    .acc-cell { color: var(--accent); }
    .sc-cell { color: var(--accent3); }

    .dl-btn {
      margin-top: 8px; padding: 10px 28px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; font-family: var(--font-ui);
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .dl-btn:hover { opacity: .85; }
  </style>
</head>
<body>
<div id="jspsych-target"></div>

<script>
/* ── Load jsPsych scripts dynamically, then boot ── */
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}
function loadCSS(href) {
  const l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = href;
  document.head.appendChild(l);
}

loadCSS('https://unpkg.com/jspsych@7.3.4/css/jspsych.css');

Promise.all([
  loadScript('https://unpkg.com/jspsych@7.3.4/jspsych.js'),
]).then(() => Promise.all([
  loadScript('https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3/index.js'),
  loadScript('https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3/index.js'),
])).then(() => {
  boot();
}).catch(err => {
  document.body.innerHTML = '<div style="color:#f06a6a;padding:40px;font-family:monospace;">Failed to load jsPsych: ' + err + '</div>';
});

/* ════════════════════════════════════════════════════════════
   EVERYTHING BELOW RUNS ONLY AFTER JSPSYCH IS LOADED
   ════════════════════════════════════════════════════════════ */
function boot() {

/* ── Stimulus maps ── */
const BASE = 'https://raw.githubusercontent.com/WilderHartwell/SocIntuitLrn/main/stim/';

const SCEN_VIDEO = {
   3: BASE + 'angry_greete.mp4',
  '-2': BASE + 'ground_greete.mp4',
   1: BASE + 'neutral_greete.mp4',
  '-3': BASE + 'sad_greete.mp4',
   0: BASE + 'shake_greete.mp4',
  '-1': BASE + 'smile_greete.mp4',
   2: BASE + 'wave_greete.mp4',
};
const RESP_IMG   = { 1: BASE + 'fear_respe.jpg', 2: BASE + 'disgust_respe.jpg', 3: BASE + 'neutral_respe.jpg' };
const RESP_LABEL = { 1: 'Fear', 2: 'Disgust', 3: 'Neutral' };
const KEY_MAP    = { 1: 'F', 2: 'J', 3: 'L' };
const KEY_TO_RESP = { f: 1, j: 2, l: 3 };
const OUT_IMG    = { 0: BASE + 'smile_fbe.jpg', 1: BASE + 'shock_fbe.jpg', '-1': BASE + 'disappoint_fbe.jpg' };

/* ── Rounding ── */
function roundAwayFromZero(x) {
  if (Math.abs(x) < 0.5) return 0;
  return x > 0 ? Math.ceil(x) : Math.floor(x);
}

/* ── Circular move ── */
function circularMove(arr, idx, delta) {
  const n = arr.length;
  const steps = roundAwayFromZero(delta);
  return ((idx + steps) % n + n) % n;
}

/* ── Variable definitions ── */
const OUT_VALS  = [-1, 0, 1];
const SCEN_VALS = [-3, -2, -1, 0, 1, 2, 3];
const RESP_VALS = [1, 2, 3];

let outIdx  = 1;  // start value: 0
let scenIdx = 3;  // start value: 0
const NUM_TRIALS = 50;
const trialLog = [];

/* ── SVG dial ── */
function makeDial(vals, activeIdx, color, size = 90) {
  const cx = size / 2, cy = size / 2, r = size * 0.36, n = vals.length;
  let p = [`<svg class="dial" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`];
  p.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a2d3e" stroke-width="1.2"/>`);
  for (let i = 0; i < n; i++) {
    const a = (2 * Math.PI * i / n) - Math.PI / 2;
    const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
    const on = i === activeIdx;
    if (on) {
      p.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="11" fill="${color}" opacity="0.18"/>`);
      p.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="11" fill="none" stroke="${color}" stroke-width="1.8"/>`);
    }
    const fs = vals[i].toString().length > 2 ? 7 : 9;
    p.push(`<text x="${x.toFixed(1)}" y="${(y+0.35*fs).toFixed(1)}" text-anchor="middle" font-size="${fs}" font-weight="${on?700:400}" fill="${on?color:'#6b6e87'}">${vals[i]}</text>`);
  }
  p.push(`<circle cx="${cx}" cy="${cy}" r="2" fill="#2a2d3e"/></svg>`);
  return p.join('');
}

/* ── Build trial stimulus ── */
let pendingRand;

function buildTrialHTML(trialNum) {
  const outVal  = OUT_VALS[outIdx];
  const scenVal = SCEN_VALS[scenIdx];
  pendingRand   = parseFloat((1.1 + Math.random() * 0.8).toFixed(3));

  const prevInfo = trialLog.length > 0 ? (() => {
    const p = trialLog[trialLog.length - 1];
    const dOut = p.newOut - p.outBefore, dScen = p.newScen - p.scenBefore;
    return `<div class="prev-strip">
      Previous: &Delta;out <span style="color:${dOut>0?'var(--pos)':dOut<0?'var(--neg)':'var(--muted)'}">${dOut>=0?'+':''}${dOut}</span>
      &nbsp;|&nbsp; &Delta;scen <span style="color:${dScen>0?'var(--pos)':dScen<0?'var(--neg)':'var(--muted)'}">${dScen>=0?'+':''}${dScen}</span>
    </div>`;
  })() : '';

  const dialOut  = makeDial(OUT_VALS,  outIdx,  '#4ecdc4');
  const dialScen = makeDial(SCEN_VALS, scenIdx, '#7c6af7', 110);
  const dialResp = makeDial(RESP_VALS, -1,      '#f7c948');

  const respCards = RESP_VALS.map(rv =>
    `<div class="resp-card" id="resp-card-${rv}">
      <img src="${RESP_IMG[rv]}" alt="${RESP_LABEL[rv]}">
      <span class="resp-key">${KEY_MAP[rv]}</span>
      <span class="resp-card-label">${RESP_LABEL[rv]}</span>
    </div>`
  ).join('');

  return `
  <div class="trial-wrap">
    <div class="trial-num">Trial <span>${trialNum}</span> / ${NUM_TRIALS}</div>
    ${prevInfo}
    <div class="stim-row">
      <div class="stim-col">
        <div class="stim-col-label">Current Outcome (out)</div>
        <img class="out-img" src="${OUT_IMG[outVal]}" alt="out=${outVal}">
        <div class="out-val-badge">${outVal >= 0 ? '+' : ''}${outVal}</div>
        ${dialOut}
      </div>
      <div class="stim-col">
        <div class="stim-col-label">Scenario (scen)</div>
        <video class="scen-video" src="${SCEN_VIDEO[scenVal]}" autoplay muted loop playsinline></video>
        <div class="scen-val-badge">${scenVal >= 0 ? '+' : ''}${scenVal}</div>
        ${dialScen}
      </div>
      <div class="stim-col">
        <div class="stim-col-label">Resp dial</div>
        ${dialResp}
        <div class="info-chip" style="margin-top:4px;">
          <span class="lbl">rand</span><span class="val">${pendingRand}</span>
        </div>
      </div>
    </div>
    <div class="eq-panel">
      <div class="eq-row">
        <span class="eq-label">Eq A &rarr;</span>
        <span class="eq-expr">rand &times; 0.33 &times; (scen + (scen &minus; resp)) &nbsp;&rarr; &Delta;out</span>
      </div>
      <div class="eq-row">
        <span class="eq-label">Eq B &rarr;</span>
        <span class="eq-expr">rand &times; 0.33 &times; (out + (scen &minus; resp)) &nbsp;&rarr; &Delta;scen</span>
      </div>
    </div>
    <div class="resp-section">
      <div class="resp-section-label">
        Press <b style="color:var(--accent3);font-family:var(--font-mono)">F</b> &middot;
              <b style="color:var(--accent3);font-family:var(--font-mono)">J</b> &middot;
              <b style="color:var(--accent3);font-family:var(--font-mono)">L</b> to respond
      </div>
      <div class="resp-btns">${respCards}</div>
    </div>
  </div>`;
}

/* ── jsPsych init ── */
const jsPsych = initJsPsych({
  display_element: 'jspsych-target',
  on_finish: showResults
});

const timeline = [];

/* Intro */
timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div style="max-width:520px;margin:0 auto;padding:40px 20px;text-align:center;">
      <div style="font-size:28px;font-weight:800;margin-bottom:10px;">Circular Equation Sim</div>
      <div style="color:var(--muted);font-size:14px;line-height:1.8;margin-bottom:24px;">
        50 trials &middot; circular equations &middot; social stimuli<br>
        Each trial: watch the scenario video, then press
        <b style="font-family:monospace">F</b>,
        <b style="font-family:monospace">J</b>, or
        <b style="font-family:monospace">L</b> to choose a response.<br>
        Your choice drives how <code style="background:var(--panel);padding:1px 6px;border-radius:4px;">out</code>
        and <code style="background:var(--panel);padding:1px 6px;border-radius:4px;">scen</code> evolve.
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-align:left;font-family:var(--font-mono);font-size:12px;margin-bottom:24px;">
        <div style="color:var(--muted);margin-bottom:6px;">EQUATIONS</div>
        <div>&Delta;out  = round( rand &times; 0.33 &times; (scen + (scen &minus; resp)) )</div>
        <div>&Delta;scen = round( rand &times; 0.33 &times; (out  + (scen &minus; resp)) )</div>
        <div style="color:var(--muted);margin-top:8px;">rand &isin; [1.1, 1.9] &middot; same each trial &middot; |x|&lt;0.5&rarr;0, |x|&ge;0.5&rarr;away from zero</div>
      </div>
      <table style="width:100%;font-family:var(--font-mono);font-size:13px;border-collapse:collapse;">
        <tr>
          <th style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:6px 12px;border-bottom:1px solid var(--border);">Key</th>
          <th style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:6px 12px;border-bottom:1px solid var(--border);">Response</th>
          <th style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:6px 12px;border-bottom:1px solid var(--border);">Value</th>
        </tr>
        <tr><td style="padding:6px 12px;color:var(--accent3);font-weight:700;">F</td><td style="padding:6px 12px;">Fear</td><td style="padding:6px 12px;color:var(--accent);">1</td></tr>
        <tr><td style="padding:6px 12px;color:var(--accent3);font-weight:700;">J</td><td style="padding:6px 12px;">Disgust</td><td style="padding:6px 12px;color:var(--accent);">2</td></tr>
        <tr><td style="padding:6px 12px;color:var(--accent3);font-weight:700;">L</td><td style="padding:6px 12px;">Neutral</td><td style="padding:6px 12px;color:var(--accent);">3</td></tr>
      </table>
    </div>`,
  choices: ['Start'],
  button_html: '<button class="dl-btn" style="margin-top:20px;">%choice%</button>'
});

/* 50 trials */
for (let t = 1; t <= NUM_TRIALS; t++) {
  const trialNum = t;
  timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: function() { return buildTrialHTML(trialNum); },
    choices: [],
    on_load: function() {
      const rand    = pendingRand;
      const outVal  = OUT_VALS[outIdx];
      const scenVal = SCEN_VALS[scenIdx];
      let responded = false;

      function handleKey(e) {
        if (responded) return;
        const key = e.key.toLowerCase();
        if (!(key in KEY_TO_RESP)) return;
        responded = true;
        document.removeEventListener('keydown', handleKey);

        const resp = KEY_TO_RESP[key];
        const card = document.getElementById('resp-card-' + resp);
        if (card) card.classList.add('active');

        const eqA = rand * 0.33 * (scenVal + (scenVal - resp));
        const eqB = rand * 0.33 * (outVal  + (scenVal - resp));

        const newOutIdx  = circularMove(OUT_VALS,  outIdx,  eqA);
        const newScenIdx = circularMove(SCEN_VALS, scenIdx, eqB);

        trialLog.push({
          trial: trialNum,
          outBefore: outVal, scenBefore: scenVal,
          resp, key: key.toUpperCase(), rand,
          eqA: parseFloat(eqA.toFixed(4)),
          eqB: parseFloat(eqB.toFixed(4)),
          deltaOut:  roundAwayFromZero(eqA),
          deltaScen: roundAwayFromZero(eqB),
          newOut:  OUT_VALS[newOutIdx],
          newScen: SCEN_VALS[newScenIdx],
          scenStim: SCEN_VIDEO[scenVal].split('/').pop(),
          respStim: RESP_IMG[resp].split('/').pop(),
          outStim:  OUT_IMG[outVal].split('/').pop(),
        });

        outIdx  = newOutIdx;
        scenIdx = newScenIdx;

        setTimeout(() => jsPsych.finishTrial({ resp, key: key.toUpperCase(), eqA, eqB }), 150);
      }

      document.addEventListener('keydown', handleKey);
    },
    on_finish: function() {}
  });
}

/* ── Results ── */
function showResults() {
  const RESP_LABEL_LOCAL = { 1: 'Fear', 2: 'Disgust', 3: 'Neutral' };

  const rows = trialLog.map(r => `
    <tr>
      <td>${r.trial}</td>
      <td class="${r.outBefore>0?'pos-cell':r.outBefore<0?'neg-cell':'zero-cell'}">${r.outBefore>=0?'+':''}${r.outBefore}</td>
      <td class="sc-cell">${r.scenBefore>=0?'+':''}${r.scenBefore}</td>
      <td class="acc-cell">${r.resp} (${RESP_LABEL_LOCAL[r.resp]})</td>
      <td style="color:var(--accent3);font-family:var(--font-mono)">${r.key}</td>
      <td style="color:var(--accent3)">${r.rand}</td>
      <td class="${r.eqA>0?'pos-cell':r.eqA<0?'neg-cell':'zero-cell'}">${r.eqA>=0?'+':''}${r.eqA}</td>
      <td class="${r.eqB>0?'pos-cell':r.eqB<0?'neg-cell':'zero-cell'}">${r.eqB>=0?'+':''}${r.eqB}</td>
      <td class="${r.deltaOut>0?'pos-cell':r.deltaOut<0?'neg-cell':'zero-cell'}">${r.deltaOut>=0?'+':''}${r.deltaOut}</td>
      <td class="${r.deltaScen>0?'pos-cell':r.deltaScen<0?'neg-cell':'zero-cell'}">${r.deltaScen>=0?'+':''}${r.deltaScen}</td>
      <td class="${r.newOut>0?'pos-cell':r.newOut<0?'neg-cell':'zero-cell'}">${r.newOut>=0?'+':''}${r.newOut}</td>
      <td class="sc-cell">${r.newScen>=0?'+':''}${r.newScen}</td>
      <td style="color:var(--muted);font-size:10px;">${r.scenStim}</td>
      <td style="color:var(--muted);font-size:10px;">${r.respStim}</td>
      <td style="color:var(--muted);font-size:10px;">${r.outStim}</td>
    </tr>`).join('');

  const csv = [
    'trial,outBefore,scenBefore,resp,respLabel,key,rand,eqA,eqB,deltaOut,deltaScen,newOut,newScen,scenStim,respStim,outStim',
    ...trialLog.map(r =>
      `${r.trial},${r.outBefore},${r.scenBefore},${r.resp},${RESP_LABEL_LOCAL[r.resp]},${r.key},${r.rand},${r.eqA},${r.eqB},${r.deltaOut},${r.deltaScen},${r.newOut},${r.newScen},${r.scenStim},${r.respStim},${r.outStim}`)
  ].join('\n');
  window._simCSV = csv;

  document.getElementById('jspsych-target').innerHTML = `
    <div class="results-wrap">
      <div class="results-title">Simulation Complete</div>
      <div class="results-sub">50 trials &middot; final state: out = ${OUT_VALS[outIdx]>=0?'+':''}${OUT_VALS[outIdx]}, scen = ${SCEN_VALS[scenIdx]>=0?'+':''}${SCEN_VALS[scenIdx]}</div>
      <button class="dl-btn" onclick="downloadCSV()">&#11015; Download CSV</button>
      <div style="overflow-x:auto;margin-top:18px;">
        <table class="log">
          <thead><tr>
            <th>#</th>
            <th>out</th><th>scen</th><th>resp</th><th>key</th><th>rand</th>
            <th>Eq A</th><th>Eq B</th>
            <th>&Delta;out</th><th>&Delta;scen</th>
            <th>out'</th><th>scen'</th>
            <th>scen stim</th><th>resp stim</th><th>out stim</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

window.downloadCSV = function() {
  const blob = new Blob([window._simCSV], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'simulation_results.csv';
  a.click();
};

jsPsych.run(timeline);

} // end boot()
</script>
</body>
</html>
