/* ── Math helpers ── */
function roundAwayFromZero(x) {
  if (Math.abs(x) < 0.5) return 0;
  return x > 0 ? Math.ceil(x) : Math.floor(x);
}
function circularMove(arr, idx, delta) {
  var n = arr.length;
  var steps = roundAwayFromZero(delta);
  return ((idx + steps) % n + n) % n;
}

/* ── State ── */

/* ── Results ── */
function showResults() {
  function cls(v){ return v>0?'pos-cell':v<0?'neg-cell':'zero-cell'; }
  function sgn(v){ return (v>=0?'+':'')+v; }

  var rows = trialLog.map(function(r) {
    return '<tr>'+
      '<td>'+r.trial+'</td>'+
      '<td class="'+cls(r.outBefore)+'">'+sgn(r.outBefore)+'</td>'+
      '<td class="sc-cell">'+sgn(r.scenBefore)+'</td>'+
      '<td class="acc-cell">'+r.resp+' ('+RESP_LABEL[r.resp]+')</td>'+
      '<td style="color:var(--accent3)">'+r.key+'</td>'+
      '<td style="color:var(--muted)">'+Math.round(r.rt)+'</td>'+
      '<td style="color:var(--accent3)">'+r.rand+'</td>'+
      '<td class="'+cls(r.eqA)+'">'+sgn(r.eqA)+'</td>'+
      '<td class="'+cls(r.eqB)+'">'+sgn(r.eqB)+'</td>'+
      '<td class="'+cls(r.deltaOut)+'">'+sgn(r.deltaOut)+'</td>'+
      '<td class="'+cls(r.deltaScen)+'">'+sgn(r.deltaScen)+'</td>'+
      '<td class="'+cls(r.newOut)+'">'+sgn(r.newOut)+'</td>'+
      '<td class="sc-cell">'+sgn(r.newScen)+'</td>'+
      '<td style="color:var(--muted);font-size:10px">'+r.scenStim+'</td>'+
      '<td style="color:var(--muted);font-size:10px">'+r.respStim+'</td>'+
      '<td style="color:var(--muted);font-size:10px">'+r.outStim+'</td>'+
    '</tr>';
  }).join('');

  var csv = ['trial,outBefore,scenBefore,resp,respLabel,key,rt,rand,eqA,eqB,deltaOut,deltaScen,newOut,newScen,scenStim,respStim,outStim'].concat(
    trialLog.map(function(r){ return [r.trial,r.outBefore,r.scenBefore,r.resp,RESP_LABEL[r.resp],r.key,r.rt,r.rand,r.eqA,r.eqB,r.deltaOut,r.deltaScen,r.newOut,r.newScen,r.scenStim,r.respStim,r.outStim].join(','); })
  ).join('\n');
  window._simCSV = csv;

  document.querySelector('.jspsych-display-element').innerHTML =
    '<div class="results-wrap">'+
    '<div class="results-title">Simulation Complete</div>'+
    '<div class="results-sub">50 trials &middot; final state: out = '+sgn(OUT_VALS[outIdx])+', scen = '+sgn(SCEN_VALS[scenIdx])+'</div>'+
    '<button class="dl-btn" onclick="downloadCSV()">&#11015; Download CSV</button>'+
    '<div style="overflow-x:auto;margin-top:18px;">'+
    '<table class="log"><thead><tr>'+
    '<th>#</th><th>out</th><th>scen</th><th>resp</th><th>key</th><th>rt(ms)</th><th>rand</th>'+
    '<th>Eq A</th><th>Eq B</th><th>&Delta;out</th><th>&Delta;scen</th>'+
    '<th>out\'</th><th>scen\'</th><th>scen stim</th><th>resp stim</th><th>out stim</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

window.downloadCSV = function() {
  var blob = new Blob([window._simCSV], {type:'text/csv'});

  a.href = URL.createObjectURL(blob);
  a.download = 'simulation_results.csv';

};

          console.log('Social blob ready for scen', key);
        })
        .catch(function(err) {
          console.warn('Social blob fetch failed for scen', key, err);
        });
    });

    // Fetch nonsocial videos

      return fetch(url)
        .then(function(r) { return r.blob(); })
        .then(function(blob) {

          console.log('Nonsocial blob ready for scen', key);
        })
        .catch(function(err) {
          console.warn('Nonsocial blob fetch failed for scen', key, err);
        });
    });

    return Promise.all(socialFetches.concat(nonsocialFetches));

  on_success: function(file) {
    console.log('Image preloaded:', file);
  },
  on_error: function(file) {
    console.warn('Image preload FAILED:', file);
  },
  on_finish: function(data) {
    console.log('Preload trial finished:', data);
    console.log('Social blob URLs ready:', Object.keys(videoBlobURLs));

let SocTrial = [];

/* Run Social trials */
SocTrial.push({
    timeline: [
    {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      return buildTrialHTML(
        jsPsych.data.get().filter({task: 'response'}).count() + 1
      );
    },

    response_ends_trial: true,
